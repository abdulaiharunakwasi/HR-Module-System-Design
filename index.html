<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR System - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-left">
                <div class="auth-brand">
                    <div class="brand-icon">
                        <i class="fas fa-building"></i>
                    </div>
                    <h1>HR Management</h1>
                    <p>Streamline your hiring process</p>
                </div>
                <div class="auth-features">
                    <div class="feature-item">
                        <i class="fas fa-user-plus"></i>
                        <span>Easy Application</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-tasks"></i>
                        <span>Track Status</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-chart-line"></i>
                        <span>Smart Analytics</span>
                    </div>
                </div>
            </div>
            <div class="auth-right">
                <div class="auth-card">
                    <div class="auth-tabs">
                        <button class="auth-tab active" onclick="switchTab('login')">
                            <i class="fas fa-sign-in-alt"></i> Login
                        </button>
                        <button class="auth-tab" onclick="switchTab('register')">
                            <i class="fas fa-user-plus"></i> Register
                        </button>
                    </div>

                    <!-- Login Form -->
                    <form id="loginForm" class="auth-form active">
                        <h2>Welcome Back</h2>
                        <p class="auth-subtitle">Sign in to continue</p>
                        
                        <div class="form-group">
                            <label><i class="fas fa-user"></i> Username</label>
                            <input type="text" id="loginUsername" placeholder="Enter username" required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-lock"></i> Password</label>
                            <input type="password" id="loginPassword" placeholder="Enter password" required>
                        </div>
                        
                        <button type="submit" class="btn-primary">
                            <i class="fas fa-arrow-right"></i> Sign In
                        </button>
                        
                        <div class="demo-credentials">
                            <span>Demo: <strong>admin</strong> / <strong>admin123</strong></span>
                            <span>or <strong>john_doe</strong> / <strong>candidate123</strong></span>
                        </div>
                    </form>

                    <!-- Register Form -->
                    <form id="registerForm" class="auth-form">
                        <h2>Create Account</h2>
                        <p class="auth-subtitle">Join our platform today</p>
                        
                        <div class="form-row">
                            <div class="form-group half">
                                <label><i class="fas fa-user"></i> Full Name</label>
                                <input type="text" id="registerFullName" placeholder="John Doe" required>
                            </div>
                            <div class="form-group half">
                                <label><i class="fas fa-user-tag"></i> Username</label>
                                <input type="text" id="registerUsername" placeholder="johndoe" required>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label><i class="fas fa-envelope"></i> Email</label>
                            <input type="email" id="registerEmail" placeholder="john@example.com" required>
                        </div>
                        
                        <div class="form-group">
                            <label><i class="fas fa-phone"></i> Phone</label>
                            <input type="tel" id="registerPhone" placeholder="+1234567890">
                        </div>
                        
                        <div class="form-group">
                            <label><i class="fas fa-lock"></i> Password (min 6 characters)</label>
                            <input type="password" id="registerPassword" placeholder="Create a strong password" required minlength="6">
                        </div>
                        
                        <div class="form-group">
                            <label><i class="fas fa-user-cog"></i> Register as</label>
                            <select id="registerRole">
                                <option value="candidate">Job Seeker (Candidate)</option>
                                <option value="hr">HR Professional</option>
                                <option value="admin">Administrator</option>
                            </select>
                        </div>
                        
                        <button type="submit" class="btn-primary">
                            <i class="fas fa-user-plus"></i> Create Account
                        </button>
                        
                        <div class="auth-footer">
                            <span>Already have an account? <a href="#" onclick="switchTab('login')">Sign In</a></span>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
